baseURL = 'http://example.org/'
languageCode = 'en-us'
title = 'ASLM Documentation'
contentDir = 'content'
enableEmoji = true

[module]
  [[module.imports]]
    path = "github.com/colinwilson/lotusdocs"
    disable = false
  [[module.imports]]
    path = "github.com/gohugoio/hugo-mod-bootstrap-scss/v5"
    disable = false

[markup]
    [markup.tableOfContents]
      # Page title is h1; show h2–h3 in TOC (class sections), not every method (h4).
      endLevel = 3
      startLevel = 2
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.goldmark.parser]
    [markup.goldmark.parser.attribute]
      block = true

[params.docs]
  darkMode = true
  # Nested sidebar dropdown levels (default in partial: 6). Deeper branches flatten to links.
  sidebarMaxDepth = 10

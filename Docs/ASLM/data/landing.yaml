# Hero
hero:
  enable: true
  weight: 10
  template: hero

  backgroundImage:
    path: "images/templates/hero"
    filename:
      desktop: "gradient-desktop.webp"
      mobile: "gradient-mobile.webp"

  badge:
    text: v0.1.0
    color: primary
    pill: false
    soft: true

  title: "ASLM Code"
  subtitle: "Welcome to ASLM Code Docs"

  image:
    path: "images"
    filename: "lotus_docs_screenshot.png"
    alt: "Lotus Docs Screenshot"
    boxShadow: true
    rounded: true

  ctaButton:
    icon: menu_book
    btnText: "Documentation"
    url: "/docs/"
  cta2Button:
    icon: feed
    btnText: "Patch Notes"
    url: "/docs/patchnotes/"

  info: "**Copyright NGGT.LightKeeper. All Rights Reserved.**"

# Feature Grid
featureGrid:
  enable: false

# Image compare
imageCompare:
  enable: false

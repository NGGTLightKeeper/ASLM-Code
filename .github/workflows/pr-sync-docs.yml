name: PR - Sync Docs

on:
  pull_request:
    types: [opened, edited, synchronize]

concurrency:
  group: pr-sync-docs-${{ github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  # Scan: squash-merge Jules branches into PR head
  scan:
    if: |
      github.actor != 'github-actions[bot]' &&
      !startsWith(github.event.pull_request.head.ref, 'jules-docs-dev-') &&
      !startsWith(github.event.pull_request.head.ref, 'jules-patchnotes-dev-')
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Find new Jules branches to merge
        id: find-branches
        uses: actions/github-script@v9
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const pr    = context.payload.pull_request;

            async function isInPrHistory(sha) {
              try {
                const cmp = await github.rest.repos.compareCommitsWithBasehead({
                  owner, repo,
                  basehead: `${sha}...${pr.head.sha}`
                });
                return cmp.data.status !== 'behind' && cmp.data.status !== 'diverged';
              } catch (e) {
                core.info(`Compare failed for ${sha}: ${e.message}`);
                return false;
              }
            }

            async function countChangedFiles(base, head) {
              const cmp = await github.rest.repos.compareCommitsWithBasehead({
                owner, repo,
                basehead: `${base}...${head}`
              });
              return (cmp.data.files || []).length;
            }

            const comments = await github.paginate(
              github.rest.issues.listComments,
              { owner, repo, issue_number: pr.number }
            );
            const alreadyTracked = new Set();
            const MARKER_RE = /<!--\s*pr-sync-docs:tracked\s*-->([\s\S]*?)<!--\s*\/pr-sync-docs:tracked\s*-->/g;
            for (const c of comments) {
              if (c.user.login !== 'github-actions[bot]') continue;
              let m;
              while ((m = MARKER_RE.exec(c.body)) !== null) {
                m[1].trim().split('\n').forEach(l => { const b = l.trim(); if (b) alreadyTracked.add(b); });
              }
            }
            core.info(`Already tracked: ${[...alreadyTracked].join(', ') || '(none)'}`);

            const allBranches = await github.paginate(
              github.rest.repos.listBranches,
              { owner, repo, per_page: 100 }
            );
            const docsBranches = allBranches
              .map(b => b.name)
              .filter(n => n.startsWith('jules-docs-dev-'));
            const pnBranches = allBranches
              .map(b => b.name)
              .filter(n => n.startsWith('jules-patchnotes-dev-'));

            const toMerge = []; // { name, date }
            const queued = new Set();
            const docsRefsToDelete = new Set(); // paired docs branches — delete after successful push

            function queueBranch(name, date) {
              if (queued.has(name) || alreadyTracked.has(name)) return false;
              toMerge.push({ name, date });
              queued.add(name);
              return true;
            }

            // ── 2. Scan via jules-docs-dev-* (primary path) ────────────────
            for (const docsBranch of docsBranches) {
              if (alreadyTracked.has(docsBranch)) {
                core.info(`Skip (already tracked): ${docsBranch}`);
                continue;
              }

              const docsCommits = await github.rest.repos.listCommits({
                owner, repo, sha: docsBranch, per_page: 100
              });
              if (docsCommits.data.length < 2) {
                core.info(`Skip (< 2 commits): ${docsBranch}`);
                continue;
              }

              const anchorSHA  = docsCommits.data[1].sha;
              const lastDocsSHA = docsCommits.data[0].sha;
              const anchorDate = new Date(docsCommits.data[1].commit.committer.date).getTime();

              if (!(await isInPrHistory(anchorSHA))) {
                core.info(`Skip (unrelated to this PR): ${docsBranch}`);
                continue;
              }

              let matchedPN = null;
              for (const pnBranch of pnBranches) {
                if (alreadyTracked.has(pnBranch) || queued.has(pnBranch)) continue;
                const pnCommits = await github.rest.repos.listCommits({
                  owner, repo, sha: pnBranch, per_page: 100
                });
                if (pnCommits.data.length < 2) continue;
                if (pnCommits.data[1].sha === lastDocsSHA) {
                  matchedPN = pnBranch;
                  break;
                }
              }

              if (matchedPN) {
                const changed = await countChangedFiles(lastDocsSHA, matchedPN);
                if (changed === 0) {
                  core.info(`Skip empty patchnotes branch: ${matchedPN}`);
                  continue;
                }
                docsRefsToDelete.add(docsBranch);
                core.info(`Queue patchnotes branch for merge: ${matchedPN}`);
                queueBranch(matchedPN, anchorDate);
              } else {
                const changed = await countChangedFiles(anchorSHA, docsBranch);
                if (changed === 0) {
                  core.info(`Skip empty docs branch: ${docsBranch}`);
                  continue;
                }
                core.info(`Queue docs branch for merge: ${docsBranch}`);
                queueBranch(docsBranch, anchorDate);
              }
            }

            // ── 3. Orphan jules-patchnotes-dev-* (docs branch already gone) ─
            for (const pnBranch of pnBranches) {
              if (queued.has(pnBranch) || alreadyTracked.has(pnBranch)) continue;

              const pnCommits = await github.rest.repos.listCommits({
                owner, repo, sha: pnBranch, per_page: 100
              });
              if (pnCommits.data.length < 2) {
                core.info(`Skip orphan (< 2 commits): ${pnBranch}`);
                continue;
              }

              const docsCommitSha = pnCommits.data[1].sha;
              let anchorSHA;
              let anchorDate;
              try {
                const docsCommit = await github.rest.git.getCommit({
                  owner, repo, commit_sha: docsCommitSha
                });
                if (!docsCommit.data.parents?.length) {
                  core.info(`Skip orphan (no parent on docs commit): ${pnBranch}`);
                  continue;
                }
                anchorSHA = docsCommit.data.parents[0].sha;
                const anchorCommit = await github.rest.git.getCommit({
                  owner, repo, commit_sha: anchorSHA
                });
                anchorDate = new Date(anchorCommit.data.committer.date).getTime();
              } catch (e) {
                core.info(`Skip orphan (resolve anchor failed): ${pnBranch}: ${e.message}`);
                continue;
              }

              if (!(await isInPrHistory(anchorSHA))) {
                core.info(`Skip orphan (unrelated to this PR): ${pnBranch}`);
                continue;
              }

              const changed = await countChangedFiles(docsCommitSha, pnBranch);
              if (changed === 0) {
                core.info(`Skip orphan empty patchnotes: ${pnBranch}`);
                continue;
              }

              core.info(`Queue orphan patchnotes branch for merge: ${pnBranch}`);
              queueBranch(pnBranch, anchorDate);
            }

            toMerge.sort((a, b) => a.date - b.date);
            const toMergeNames = toMerge.map(e => e.name);

            core.info(`Branches to merge (sorted): ${toMergeNames.join(', ') || '(none)'}`);
            core.setOutput('new_branches', JSON.stringify(toMergeNames));
            core.setOutput('docs_refs_to_delete', JSON.stringify([...docsRefsToDelete]));

      - name: Checkout PR head branch
        if: steps.find-branches.outputs.new_branches != '[]'
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Squash-merge Jules branches into PR head
        if: steps.find-branches.outputs.new_branches != '[]'
        env:
          BRANCHES_JSON: ${{ steps.find-branches.outputs.new_branches }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for branch in $(echo "$BRANCHES_JSON" | jq -r '.[]'); do
            git fetch origin "$branch"
            if ! git merge --squash -X theirs "origin/$branch"; then
              echo "::warning::Squash merge conflict for ${branch}; dropping this branch."
              git merge --abort 2>/dev/null || true
              git reset --hard HEAD
              git clean -fd
              continue
            fi
            if ! git diff --cached --quiet; then
              git commit -m "chore: integrate Jules docs from ${branch} [skip ci]"
              echo "Committed squash of ${branch}"
            else
              echo "Nothing to commit from ${branch} (already up-to-date)"
            fi
          done

          git push origin HEAD:${{ github.event.pull_request.head.ref }}

      - name: Post tracking comment
        if: steps.find-branches.outputs.new_branches != '[]'
        uses: actions/github-script@v9
        env:
          BRANCHES_JSON: ${{ steps.find-branches.outputs.new_branches }}
        with:
          script: |
            const branches = JSON.parse(process.env.BRANCHES_JSON);
            const body = [
              '<!-- pr-sync-docs:tracked -->',
              ...branches,
              '<!-- /pr-sync-docs:tracked -->'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

      - name: Delete merged Jules branches from remote
        if: steps.find-branches.outputs.new_branches != '[]'
        uses: actions/github-script@v9
        env:
          BRANCHES_JSON: ${{ steps.find-branches.outputs.new_branches }}
          DOCS_REFS_JSON: ${{ steps.find-branches.outputs.docs_refs_to_delete }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo  = context.repo.repo;
            const merged = JSON.parse(process.env.BRANCHES_JSON);
            const docsRefs = JSON.parse(process.env.DOCS_REFS_JSON || '[]');
            const toDelete = [...new Set([...merged, ...docsRefs])];

            for (const branch of toDelete) {
              try {
                await github.rest.git.deleteRef({ owner, repo, ref: `heads/${branch}` });
                core.info(`Deleted remote branch after merge: ${branch}`);
              } catch (e) {
                if (e.status === 404 || e.status === 422) {
                  core.info(`Branch already gone: ${branch}`);
                } else {
                  core.warning(`Could not delete ${branch}: ${e.message}`);
                }
              }
            }
